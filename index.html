<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google-site-verification" content="4MFLBRfVSt3FhnU55XNS_HxHK-9NfiCsQU77sSyxu4E" />

  <script src="config.js"></script>

  <script>
    const personSchema = {
      "@context": "https://schema.org",
      "@type": "Person",
      "@id": "https://ephemeral8997.github.io/#person",
      "name": SITE_CONFIG.profile.username,
      "image": `https://ephemeral8997.github.io/${SITE_CONFIG.profile.pfp}`,
      "description": "Developer focused on automation, web development, and practical tools",
      "url": "https://ephemeral8997.github.io",
      "sameAs": SITE_CONFIG.socials.map(s => s.url),
      "knowsAbout": [
        "Python Programming", "Lua Programming", "HTML/CSS Development",
        "SQL Databases", "Regular Expressions", "Bash Scripting",
        "OCR Technology", "Automation Tools"
      ],
      "hasOccupation": {
        "@type": "Occupation",
        "name": "Developer"
      }
    };

    const script = document.createElement('script');
    script.type = 'application/ld+json';
    script.text = JSON.stringify([
      personSchema,
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "@id": "https://ephemeral8997.github.io/#website",
        "url": "https://ephemeral8997.github.io",
        "name": "ephemeral8997 - Developer",
        "author": { "@id": "https://ephemeral8997.github.io/#person" }
      }
    ]);
    document.head.appendChild(script);
  </script>
</head>

<body>
  <section class="hero">
    <div class="container">
      <div class="hero-content">
        <div class="cta-buttons" id="hero-ctas">
          <a href="projects.html" class="btn btn-primary">View My Work</a>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const ctaContainer = document.getElementById('hero-ctas');
      if (ctaContainer && typeof SITE_CONFIG !== 'undefined') {
        const githubLink = document.createElement('a');
        githubLink.href = SITE_CONFIG.profile.github;
        githubLink.target = "_blank";
        githubLink.className = "btn btn-secondary";
        githubLink.rel = "me";
        githubLink.textContent = "GitHub";
        ctaContainer.appendChild(githubLink);
      }
    });
  </script>
</body>

</html>
