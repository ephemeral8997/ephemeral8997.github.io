<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connect with ephemeral8997 across all social platforms">
  <title>Connect - ephemeral8997</title>
  <link rel="stylesheet" href="styles.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
</head>

<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">&gt; ephemeral8997</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="blog.html">Blog</a>
        <a href="connect.html" style="color: var(--text-primary);">Connect</a>
      </div>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <h1 class="section-title">Connect With Me</h1>
      <p style="color: var(--text-secondary); margin-bottom: 3rem;">Find me across various platforms.</p>

      <div id="social-grid" class="social-grid"></div>

      <div class="contact-info">
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>© 2026 ephemeral8997</p>
    </div>
  </footer>

  <script src="config.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('social-grid');
      if (typeof SITE_CONFIG !== 'undefined' && grid) {
        grid.innerHTML = SITE_CONFIG.socials.map(link => `
          <a href="${link.url}" target="_blank" class="social-card" rel="me">
            <div class="social-icon">${link.icon}</div>
            <h3>${link.name}</h3>
            <p>${link.description}</p>
            <span class="social-link">${link.handle}</span>
          </a>
        `).join('');
      }
    });
  </script>
</body>

</html>
